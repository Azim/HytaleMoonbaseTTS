name: Rebuild

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Get latest commit hash
        run: echo "LATEST_COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - name: Get latest version
        run: echo "VERSION=0.1.1" >> $GITHUB_ENV
      - name: Get latest hytale version
        run: echo "HYTALE_VERSION=2026.03.26-89796e57b" >> $GITHUB_ENV
      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: maven
      - name: Build fatjar
        run: mvn clean package -P fatjar -Drevision=$VERSION-$LATEST_COMMIT_HASH -Dhytale-version=$HYTALE_VERSION
      - name: Build with libby
        run: mvn clean package -P with-libby -Drevision=$VERSION-$LATEST_COMMIT_HASH -Dhytale-version=$HYTALE_VERSION
      - name: Upload fatjar artifact
        uses: actions/upload-artifact@v6
        with:
          name: HytaleMoonbaseTTS-fatjar
          path: ./target/fatjar/HytaleMoonbaseTTS-*.jar
          if-no-files-found: error
      - name: Upload libby artifact
        uses: actions/upload-artifact@v6
        with:
          name: HytaleMoonbaseTTS-libby
          path: ./target/with-libby/HytaleMoonbaseTTS-*.jar
          if-no-files-found: error
      - name: Upload libby to modtale
        run: |
          JAR_PATH=./target/with-libby/HytaleMoonbaseTTS-*.jar
          
          echo "Found Jar: $JAR_PATH"
          echo "Publishing Version: $VERSION-$LATEST_COMMIT_HASH"

          curl -X POST "https://api.modtale.net/api/v1/projects/$PROJECT_ID/versions" \
            -H "X-MODTALE-KEY: ${{ secrets.MODTALE_TOKEN }}" \
            -F "file=@$JAR_PATH" \
            -F "versionNumber=$VERSION-$LATEST_COMMIT_HASH" \
            -F "gameVersions=$HYTALE_VERSION" \
            -F "channel=BETA" \
            -F "changelog=Automated Build & Release from GitHub"